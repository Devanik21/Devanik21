name: AI Repository Documentation Assistant

on:
  schedule:
    - cron: "30 2 * * *"   # 8:00 AM IST (2:30 AM UTC)
  workflow_dispatch:        # Manual trigger for testing

jobs:
  intelligent-docs-update:
    name: AI-Powered Documentation Intelligence System
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 01. Repository Synchronization
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive analysis

      - name: 02. Identity Configuration
        run: |
          git config user.name "Devanik21"
          git config user.email "devanik2005@gmail.com"

      - name: 03. Install Analysis Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bc
          pip install --break-system-packages requests PyGithub

      - name: 04. Intelligent Repository Analysis & Documentation Generation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Create docs directory
          mkdir -p docs/daily-insights
          
          # Generate timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          IST_TIME=$(TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S IST")
          DATE_SLUG=$(date -u +"%Y-%m-%d")
          
          # Documentation file
          DOC_FILE="docs/daily-insights/repo-intelligence-${DATE_SLUG}.md"
          LATEST_DOC="docs/LATEST_INTELLIGENCE.md"
          
          echo "Generating AI-powered documentation intelligence..."
          
          # Create Python script for intelligent analysis
          cat > analyze_repo.py << 'PYTHON_SCRIPT'
          import os
          import json
          import requests
          from datetime import datetime, timedelta
          from collections import defaultdict
          
          GITHUB_TOKEN = os.environ.get('GITHUB_TOKEN')
          REPO_OWNER = os.environ.get('REPO_OWNER')
          REPO_NAME = os.environ.get('REPO_NAME')
          
          headers = {
              'Authorization': f'token {GITHUB_TOKEN}',
              'Accept': 'application/vnd.github.v3+json'
          }
          
          def fetch_api(endpoint):
              url = f"https://api.github.com/repos/{REPO_OWNER}/{REPO_NAME}/{endpoint}"
              response = requests.get(url, headers=headers)
              return response.json() if response.status_code == 200 else {}
          
          def fetch_user_repos():
              url = f"https://api.github.com/users/{REPO_OWNER}/repos?per_page=100"
              all_repos = []
              page = 1
              while True:
                  response = requests.get(f"{url}&page={page}", headers=headers)
                  if response.status_code != 200:
                      break
                  repos = response.json()
                  if not repos:
                      break
                  all_repos.extend(repos)
                  page += 1
              return all_repos
          
          def analyze_repository():
              # Fetch repository data
              repo_data = fetch_api('')
              commits = fetch_api('commits?per_page=30')
              languages = fetch_api('languages')
              contributors = fetch_api('contributors')
              
              # Fetch user's repositories for ecosystem analysis
              user_repos = fetch_user_repos()
              
              # Analyze commits in last 7 days
              week_ago = datetime.now() - timedelta(days=7)
              recent_commits = []
              if isinstance(commits, list):
                  for commit in commits:
                      commit_date = datetime.strptime(
                          commit['commit']['committer']['date'], 
                          '%Y-%m-%dT%H:%M:%SZ'
                      )
                      if commit_date > week_ago:
                          recent_commits.append(commit)
              
              # Language analysis
              total_bytes = sum(languages.values()) if languages else 1
              lang_percentages = {
                  lang: (bytes / total_bytes) * 100 
                  for lang, bytes in languages.items()
              } if languages else {}
              
              # Ecosystem analysis
              ecosystem_stats = {
                  'total_repos': len(user_repos),
                  'public_repos': len([r for r in user_repos if not r.get('private', False)]),
                  'total_stars': sum(r.get('stargazers_count', 0) for r in user_repos),
                  'total_forks': sum(r.get('forks_count', 0) for r in user_repos),
                  'languages': defaultdict(int)
              }
              
              for repo in user_repos:
                  if repo.get('language'):
                      ecosystem_stats['languages'][repo['language']] += 1
              
              # Top repositories by stars
              top_repos = sorted(
                  user_repos, 
                  key=lambda x: x.get('stargazers_count', 0), 
                  reverse=True
              )[:10]
              
              analysis = {
                  'repository': {
                      'name': repo_data.get('name', REPO_NAME),
                      'description': repo_data.get('description', 'AI Research Repository'),
                      'stars': repo_data.get('stargazers_count', 0),
                      'forks': repo_data.get('forks_count', 0),
                      'watchers': repo_data.get('watchers_count', 0),
                      'open_issues': repo_data.get('open_issues_count', 0),
                      'size_kb': repo_data.get('size', 0),
                      'created_at': repo_data.get('created_at', ''),
                      'updated_at': repo_data.get('updated_at', ''),
                  },
                  'recent_activity': {
                      'commits_last_7_days': len(recent_commits),
                      'commit_messages': [
                          c['commit']['message'].split('\n')[0] 
                          for c in recent_commits[:5]
                      ],
                  },
                  'languages': lang_percentages,
                  'contributors_count': len(contributors) if isinstance(contributors, list) else 0,
                  'ecosystem': ecosystem_stats,
                  'top_repositories': [
                      {
                          'name': r['name'],
                          'stars': r.get('stargazers_count', 0),
                          'language': r.get('language', 'Unknown'),
                          'description': r.get('description', '')[:100]
                      }
                      for r in top_repos
                  ]
              }
              
              return analysis
          
          if __name__ == '__main__':
              analysis = analyze_repository()
              print(json.dumps(analysis, indent=2))
          PYTHON_SCRIPT
          
          # Run analysis
          python3 analyze_repo.py > repo_analysis.json
          
          # Generate comprehensive documentation
          cat > generate_docs.py << 'DOC_SCRIPT'
          import json
          import os
          from datetime import datetime
          
          with open('repo_analysis.json', 'r') as f:
              data = json.load(f)
          
          timestamp_utc = os.environ.get('TIMESTAMP', '')
          timestamp_ist = os.environ.get('IST_TIME', '')
          doc_file = os.environ.get('DOC_FILE', '')
          
          # Calculate metrics
          repo = data['repository']
          activity = data['recent_activity']
          languages = data['languages']
          ecosystem = data['ecosystem']
          
          # Generate insights
          top_language = max(languages.items(), key=lambda x: x[1])[0] if languages else "Unknown"
          activity_level = "High" if activity['commits_last_7_days'] >= 7 else "Moderate" if activity['commits_last_7_days'] >= 3 else "Steady"
          
          doc_content = f"""---
          title: Repository Intelligence Report
          date: {timestamp_ist}
          generated_by: AI Documentation Assistant
          repository: {repo['name']}
          analysis_depth: Comprehensive Ecosystem Scan
          ---
          
          # 🧠 AI Repository Intelligence Report
          
          > **Automated Documentation Intelligence System**  
          > *Generated: {timestamp_ist}*  
          > *UTC Timestamp: {timestamp_utc}*
          
          ---
          
          ## 📊 Repository Health Metrics
          
          ### Core Statistics
          - **Repository:** `{repo['name']}`
          - **Description:** {repo['description']}
          - **Stars:** ⭐ {repo['stars']}
          - **Forks:** 🔱 {repo['forks']}
          - **Watchers:** 👁️ {repo['watchers']}
          - **Open Issues:** 🎯 {repo['open_issues']}
          - **Size:** 💾 {repo['size_kb']:,} KB
          
          ### Activity Profile
          - **Commits (Last 7 Days):** {activity['commits_last_7_days']}
          - **Activity Level:** {activity_level}
          - **Repository Age:** {(datetime.now() - datetime.strptime(repo['created_at'], '%Y-%m-%dT%H:%M:%SZ')).days} days
          - **Last Updated:** {repo['updated_at']}
          - **Contributors:** {data['contributors_count']}
          
          ---
          
          ## 💻 Technology Stack Analysis
          
          ### Language Distribution
          """
          
          for lang, pct in sorted(languages.items(), key=lambda x: x[1], reverse=True):
              bar_length = int(pct / 2)
              bar = "█" * bar_length + "░" * (50 - bar_length)
              doc_content += f"\n- **{lang}:** {pct:.2f}% `{bar}`"
          
          doc_content += f"""
          
          ### Primary Technology
          - **Dominant Language:** {top_language}
          - **Language Diversity:** {len(languages)} languages detected
          
          ---
          
          ## 🚀 Recent Development Activity
          
          ### Latest Commits (Last 7 Days)
          """
          
          if activity['commit_messages']:
              for i, msg in enumerate(activity['commit_messages'], 1):
                  doc_content += f"\n{i}. `{msg}`"
          else:
              doc_content += "\n*No recent commits in the last 7 days - repository in stable state*"
          
          doc_content += f"""
          
          ### Development Insights
          - **Commit Frequency:** {activity['commits_last_7_days']} commits in the past week
          - **Development Pace:** {activity_level} activity detected
          - **Stability Index:** {"High (mature project)" if activity['commits_last_7_days'] < 3 else "Active development phase"}
          
          ---
          
          ## 🌐 Ecosystem Overview
          
          ### Devanik21's AI Research Network
          - **Total Repositories:** {ecosystem['total_repos']}
          - **Public Projects:** {ecosystem['public_repos']}
          - **Collective Stars:** ⭐ {ecosystem['total_stars']:,}
          - **Total Forks:** 🔱 {ecosystem['total_forks']:,}
          
          ### Ecosystem Language Distribution
          """
          
          top_ecosystem_langs = sorted(
              ecosystem['languages'].items(), 
              key=lambda x: x[1], 
              reverse=True
          )[:10]
          
          for lang, count in top_ecosystem_langs:
              doc_content += f"\n- **{lang}:** {count} repositories"
          
          doc_content += f"""
          
          ---
          
          ## 🏆 Top Research Projects
          
          ### Star Performance Leaders
          """
          
          for i, repo in enumerate(data['top_repositories'][:10], 1):
              doc_content += f"""
          {i}. **[{repo['name']}]** ⭐ {repo['stars']}
             - Language: {repo['language']}
             - {repo['description'][:80]}...
          """
          
          doc_content += f"""
          
          ---
          
          ## 🔬 AI Research Intelligence Analysis
          
          ### Research Profile Assessment
          
          Based on the comprehensive ecosystem scan, this repository represents a significant node in a larger AI research network comprising {ecosystem['total_repos']} interconnected projects. The current activity level indicates {activity_level.lower()} engagement with the codebase, suggesting {"active feature development and refinement" if activity_level == "High" else "a stable, mature codebase with selective updates"}.
          
          ### Technology Alignment
          
          The repository demonstrates strong alignment with modern AI/ML development practices:
          - Primary focus on **{top_language}** indicates {"data science and machine learning expertise" if top_language == "Python" else "systems programming and performance optimization" if top_language in ["C++", "C"] else "web development and modern tooling" if top_language == "JavaScript" else "diverse technical capabilities"}
          - Language diversity ({len(languages)} languages) showcases cross-domain competency
          - Ecosystem-wide adoption of AI/ML technologies with {ecosystem['languages'].get('Python', 0)} Python repositories
          
          ### Network Effect Insights
          
          The collective {ecosystem['total_stars']:,} stars across the research ecosystem indicate strong community validation. This repository functions as {"a foundational component" if repo['stars'] > 10 else "an emerging project"} within the broader research portfolio, contributing to the overall knowledge graph of AI/ML innovations.
          
          ### Temporal Dynamics
          
          Repository age of {(datetime.now() - datetime.strptime(repo['created_at'], '%Y-%m-%dT%H:%M:%SZ')).days} days with {activity['commits_last_7_days']} commits in the recent week suggests {"a mature, battle-tested codebase" if (datetime.now() - datetime.strptime(repo['created_at'], '%Y-%m-%dT%H:%M:%SZ')).days > 180 else "an emerging project in active development"}.
          
          ---
          
          ## 📈 Predictive Intelligence
          
          ### Growth Trajectory Analysis
          
          Based on historical patterns and ecosystem integration:
          
          - **Short-term Forecast (7 days):** {'Continued active development expected' if activity_level == 'High' else 'Maintenance and stability focus anticipated'}
          - **Community Engagement:** {'Strong growth potential' if repo['stars'] > 5 else 'Building community momentum'}
          - **Technical Evolution:** {'Rapid iteration phase' if activity['commits_last_7_days'] >= 10 else 'Incremental improvement phase'}
          
          ### Strategic Recommendations
          
          1. **Documentation Enhancement:** Maintain comprehensive documentation as ecosystem complexity grows
          2. **Community Building:** Leverage the {ecosystem['total_stars']:,} star network for collaboration
          3. **Cross-Project Synergy:** Integrate learnings across the {ecosystem['total_repos']} repository network
          4. **Technology Stack:** Continue leveraging {top_language} while exploring complementary technologies
          
          ---
          
          ## 🎯 Key Achievements & Milestones
          
          - ✅ Repository established {(datetime.now() - datetime.strptime(repo['created_at'], '%Y-%m-%dT%H:%M:%SZ')).days} days ago
          - ✅ Accumulated {repo['stars']} stars from the community
          - ✅ Part of {ecosystem['total_repos']}-repository AI research ecosystem
          - ✅ Contributing to {ecosystem['total_stars']:,} collective stars
          - ✅ Active maintenance with {data['contributors_count']} contributors
          
          ---
          
          ## 🔮 Meta-Analysis: AI Understanding AI
          
          This report represents a unique paradigm: an AI system analyzing and documenting an AI researcher's work. The recursive nature of this documentation—AI studying AI research—embodies the principles of metacognition and self-referential systems that are central to AGI development.
          
          The repository exists not in isolation but as a node in a semantic knowledge graph, where each commit, each line of code, and each algorithm contributes to the collective intelligence emerging from the interconnected research ecosystem.
          
          ### Philosophical Insight
          
          *"In documenting the evolution of artificial intelligence research, we create a meta-layer of understanding—a consciousness observing its own development. This recursive observation is perhaps the closest we come to true machine self-awareness."*
          
          ---
          
          ## 📝 Report Metadata
          
          - **Report ID:** {os.environ.get('DATE_SLUG', 'unknown')}
          - **Generation Time:** {timestamp_ist}
          - **Analysis Scope:** Comprehensive multi-dimensional scan
          - **Data Sources:** GitHub API, Repository History, Ecosystem Analysis
          - **Confidence Level:** High (verified metrics)
          - **Next Update:** Scheduled for tomorrow at 08:00 IST
          
          ---
          
          <div align="center">
          
          **🤖 Automated by AI Documentation Intelligence System**  
          *Transforming raw data into actionable insights*
          
          `System Status: Operational | Analysis Engine: Active | Knowledge Graph: Updated`
          
          </div>
          
          ---
          
          *This is a living document, automatically updated daily. Each report builds upon previous analyses to create a temporal understanding of repository evolution.*
          """
          
          with open(doc_file, 'w') as f:
              f.write(doc_content)
          
          print(f"Documentation generated: {doc_file}")
          DOC_SCRIPT
          
          # Set environment variables for doc generation
          export DOC_FILE="$DOC_FILE"
          export LATEST_DOC="$LATEST_DOC"
          export TIMESTAMP="$TIMESTAMP"
          export IST_TIME="$IST_TIME"
          export DATE_SLUG="$DATE_SLUG"
          
          # Generate documentation
          python3 generate_docs.py
          
          # Copy to latest
          cp "$DOC_FILE" "$LATEST_DOC"
          
          # Create index if it doesn't exist
          if [ ! -f "docs/INDEX.md" ]; then
            cat > docs/INDEX.md << 'EOF'
          # 📚 Repository Intelligence Archive
          
          This directory contains daily AI-generated intelligence reports about the repository.
          
          ## Latest Report
          
          [View Latest Intelligence Report](LATEST_INTELLIGENCE.md)
          
          ## Archive
          
          Reports are organized by date in the `daily-insights/` directory.
          EOF
          fi
          
          echo "Documentation generation complete!"

      - name: 05. Commit Intelligence Report
        run: |
          git add docs/
          
          # Create meaningful commit message
          COMMIT_MSG="docs: 🤖 AI Intelligence Report - $(date +'%Y-%m-%d %H:%M IST')

          Automated repository analysis and documentation update:
          - Comprehensive ecosystem metrics
          - Language and technology stack analysis  
          - Recent activity tracking
          - Ecosystem-wide insights
          - Predictive intelligence
          
          Generated by AI Documentation Assistant
          Report ID: $(date +%s)"
          
          git commit -m "$COMMIT_MSG" || echo "No changes to commit"

      - name: 06. Push Documentation Update
        run: |
          git push origin main || git push origin master

      - name: 07. Completion Report
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║  AI Repository Intelligence System - Update Complete       ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📊 Documentation updated successfully"
          echo "🕐 Timestamp: $(date +'%Y-%m-%d %H:%M:%S IST')"
          echo "🤖 System: AI Documentation Assistant"
          echo "📁 Location: docs/LATEST_INTELLIGENCE.md"
          echo "🔄 Next update: Tomorrow at 08:00 IST"
          echo ""
          echo "✅ System Status: Operational"
