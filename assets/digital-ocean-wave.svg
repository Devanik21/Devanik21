<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="100%" height="80">
<defs>
  <style>
    @keyframes move0 { 0% { transform: translateX(0px); } 100% { transform: translateX(-1200px); } }
    .wave0 { animation: move0 30s linear infinite; }
    @keyframes move1 { 0% { transform: translateX(-1200px); } 100% { transform: translateX(0px); } }
    .wave1 { animation: move1 38s linear infinite; }
    @keyframes move2 { 0% { transform: translateX(0px); } 100% { transform: translateX(-1200px); } }
    .wave2 { animation: move2 46s linear infinite; }
    @keyframes move3 { 0% { transform: translateX(-1200px); } 100% { transform: translateX(0px); } }
    .wave3 { animation: move3 54s linear infinite; }
  </style>
  <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
    <stop offset="60%" stop-color="#9B59B6" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
  </linearGradient>
</defs>
<g opacity="1.0">
  <path class="wave0" d="M 0 80 L 0 30 L 200 35 L 400 25 L 600 35 L 800 25 L 1000 35 L 1200 30 L 1400 35 L 1600 25 L 1800 35 L 2000 25 L 2200 35 L 2400 30 L 2400 80 Z" fill="url(#waveGrad)" stroke="#00D4FF" stroke-opacity="0.5" stroke-width="2" />
  <path class="wave1" d="M 0 80 L 0 40 L 200 30 L 400 45 L 600 30 L 800 45 L 1000 30 L 1200 40 L 1400 30 L 1600 45 L 1800 30 L 2000 45 L 2200 30 L 2400 40 L 2400 80 Z" fill="url(#waveGrad)" stroke="#00D4FF" stroke-opacity="0.6" stroke-width="2" />
  <path class="wave2" d="M 0 80 L 0 50 L 200 40 L 400 55 L 600 40 L 800 55 L 1000 40 L 1200 50 L 1400 40 L 1600 55 L 1800 40 L 2000 55 L 2200 40 L 2400 50 L 2400 80 Z" fill="url(#waveGrad)" stroke="#00D4FF" stroke-opacity="0.7" stroke-width="2" />
</g>
</svg>
