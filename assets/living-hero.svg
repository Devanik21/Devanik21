<circle cx="100" cy="260" r="1.5" fill="#00D4FF" style="animation: particleDrift 12s ease-in-out infinite 0.0s;"/>
<circle cx="250" cy="270" r="1.5" fill="#FF6B6B" style="animation: particleDrift 15s ease-in-out infinite 1.5s;"/>
<circle cx="400" cy="255" r="1.5" fill="#FFD93D" style="animation: particleDrift 10s ease-in-out infinite 3.0s;"/>
<circle cx="550" cy="265" r="1.5" fill="#9B59B6" style="animation: particleDrift 13s ease-in-out infinite 4.5s;"/>
