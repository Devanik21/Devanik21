<path d="M -800 280 L -800 220.7 L -770 227.6 L -740 231.0 L -710 231.4 L -680 234.2 L -650 242.1 L -620 250.8 L -590 253.9 L -560 249.7 L -530 243.5 L -500 240.6 L -470 240.5 L -440 237.6 L -410 229.5 L -380 220.3 L -350 216.6 L -320 220.0 L -290 225.6 L -260 227.9 L -230 227.8 L -200 230.5 L -170 238.8 L -140 248.5 L -110 252.7 L -80 250.0 L -50 245.1 L -20 243.4 L 10 243.9 L 40 241.4 L 70 233.0 L 100 223.0 L 130 218.2 L 160 220.3 L 190 224.4 L 220 225.5 L 250 224.5 L 280 226.8 L 310 235.2 L 340 245.4 L 370 250.7 L 400 249.3 L 430 245.8 L 460 245.4 L 490 247.0 L 520 245.0 L 550 236.7 L 580 226.3 L 610 220.6 L 640 221.4 L 670 224.2 L 700 223.9 L 730 221.7 L 760 223.3 L 790 231.4 L 820 241.9 L 850 248.0 L 880 247.7 L 910 245.6 L 940 246.6 L 970 249.4 L 1000 248.3 L 1030 240.5 L 1060 229.9 L 1090 223.6 L 1120 223.4 L 1150 224.9 L 1180 223.2 L 1210 219.7 L 1240 220.2 L 1270 227.8 L 1300 238.2 L 1330 244.7 L 1360 245.3 L 1390 244.4 L 1420 246.8 L 1450 251.0 L 1480 251.1 L 1510 243.9 L 1540 233.7 L 1570 227.1 L 1600 226.2 L 1600 280 Z" fill="url(#waveGrad)" stroke="url(#waveStroke)" stroke-width="0.8" style="animation: waveFlow 15s linear infinite;"/>
