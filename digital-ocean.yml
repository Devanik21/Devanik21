name: Digital Ocean Asset Generator

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate Assets
        run: |
          python generate_wave.py
          python generate_isometric.py
          python tmp_dragon.py
          python generate_living_divider.py

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/*.svg
          git commit -m "Generated latest Digital Ocean & Neural assets" || echo "No changes to commit"
          git push
